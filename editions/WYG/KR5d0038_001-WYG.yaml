body:
  text: 亢倉子注唐何粲撰全道篇第一心冥虚極徳洞𤣥㣲功並四時蒼生自化亢倉㜽古子字上从巛髮也師古曰子者人之嘉稱居羽山之顔弎古三字或作參數名秊秊从禾千穀熟也取禾嵗一也俗作年羽山尚書禹貢在徐州舜典云殛鯀于羽山蓋在東裔後屬魯國顔山之南面也莊子引此章云北居㟪壘之山即此山是也俗無疵癘而仍穀聖賢所在天祐之福故俗無疵癘而五穀豐稔頻曰仍其俗竊相謂曰亢倉㜽之始来吾鮮从火肰燒也借為語助作然非異之鮮然驚異之貌異其虚懐寂泊不存近情今吾日計之不足嵗計之有餘其或聖者邪驗其利益故疑之為聖人盍相與尸而祝之音社而稷之虖虖俗作乎語助盍何不也既䝉厚利欲立為君主而建置宗廟并及社稷壇壝祝祭南面事之乎亢倉㜽聞之色有不釋其徒黶一本黯啜從而啓之黶啜亢倉㜽門人也欲知其心故從而諮啓亢倉㜽曰吾聞至人尸居環堵之室而百姓猖狂不知其所如古往字之也至人㝠心絶慮有𩔖於尸無事蕭然獨居環堵蒼生欣慕其往歸依察其所歸非由知者也今以羽俗父子竊竊焉將爼豆予我其的一作杓之人邪竊竊私議之謂也我本栖𨼆全道任真今乃爼豆相尊反成人之標的吾是以不釋舍也於老聃之言老聃言我旡為而民自化我無事而民自足我好靜而民自正今乃反此故不釋其言黶啜曰不者不者猶不然也夫尋常之汙巨無所還其體而鯢鰌音為之制步仞之丘巨獸無所𨼆其軀而㜸狐之祥八尺曰尋倍尋曰常汙池也還也鯢小魚而有脚制猶専擅也六尺曰步七尺曰仞㜸妖也詳善也言小水不能容巨魚小丘不能藏大獸喻亢倉子道德既髙必須厚禄也且也尊賢叓音事古作叓从史之省聲能嚮善就利自堯䑞以固而况羽俗虖先生其矣亢倉㜽曰譆来譆歎聲也怪其不逹已志故發譆歎將欲告之致逺故呼之来夫二子者知虖二子堯䑞也知乎言豈知之函車之獸介而離山罔罟制之吞舟之蕩而失水螻蟻苦之故鳥獸居欲其髙鼈居欲其湥古深字从水突聲淺湥之對夫全其形生之人藏其身也亦不厭湥𦕈而已函盈也介孤也𦕈逺也吾語若若汝也大亂之本虖堯䑞之間其音終存虖音乎千代之後必有人與相食者矣事有先成後敗始吉終凶胡可必邪故堯舜禪讓而光一時之美迹流後代成簒弑之禍故莊子云堯舜讓而帝噲之讓而絶湯武爭而王白公爭而滅斯其效歟夫惟不立善名者則事迹冥絶无所企慕耳言未終南子榮之樗色蹵膝席曰樗秊運而長矣將奚以託業以叓音事斯言榮之樗莊子所謂南禜趎也既聞髙誼將欲蹵然變色歛膝於席願垂告示以敬事此言亢倉㜽曰全汝形抱汝生无古悖字从子亂也逆也汝思慮營營若此緒秊或可以及此言營營運動不息也緒終也全形抱生不運思慮虛心冥寂道自居之比此終秊可及此言也雖吾才小不足以化㜽㜽胡不南謁吾師聃聃老子名亢倉㜽既謝榮之樗不釋羽俗而龍化虖天下謝遣也不釋羽俗潜遁而遊如龍變化與時升降水之性清土者抇胡骨反之故不得清人之性夀物者相之故不得夀抇亂也人性夀考為外物所亂使不終天年物也者所以養性也今代之惑者多以性養物不知輕重也衣食養性不可一日而无而惑者乃損性以求物物愈積而性愈傷殊不知性重物輕倒置也是故聖人之於聲色滋味也利於性取之音害利害之對於性捐之此全性之道也㸘古萬字數名人操弓音共射一招又音鵰招无不中㸘物章章以一生生无不傷捐棄也操持也招射的也章章猶擾擾故聖人之制萬物也全其天也聖人抑制萬物不使傷性以全天真天全神全矣神全之人不慮而通不謀而當精照无外志凝宇宙悳若墬古地字从土彖聲與埅同上㜽而不驕下匹夫而不惽此之謂全道之人神全之人智慮充溢志氣凝乎宇宙覆載之徳同乎天地雖貴為天子賤為匹夫不以窮達而迴其志心平正不外物所誘曰清清而能久古則字从鼎刀𨽻作則朙朙而能久虛虚道全而居之秦佚死亢倉㜽哭之秦佚古之有道者蓋老子之友也其役曰天下皆死先生何哭也役門人充使役也死生之道古今是常達人休之不哭可也亢倉㜽曰天下皆哭安得不哭順物而哭雖哭而非哭其役曰哭者必哀而先生未始哀何也未始未嘗也世人之哭必生哀痛今先生雖哭不見哀傷敢問何故亢倉㜽曰舉天之下吾无與樂安所取哀夫有樂必有哀人之常情也達人大觀豈有疎親既不與為樂亦无所取哀蜕墬之謂水蜕水之謂气蜕气之謂虚蜕虚之謂道蜕者免蜕之謂也夫蜕地之謂水蜕水之謂气蜕气之謂虚蜕虚之謂道猶至人不係情於哀樂然後為極者也虚者道之體靖者道之埅音地理者道之綱識者道之目言至人能虚能靜有理有識者則能契道之形躰知道之綱目道所以保神悳古徳字从心直聲有徳者心直所以宏量禮所以亝音齊平也物物所以養體四者皆可以資身不可暫无好質白之物者以黑汚好質黑之物者以白汚吾又安知天下之正潔汚哉由是不主物之㓗汚者矣夫瞀莫豆反眎者以黈偷厚反赤以蒼𤣥吾乃今所謂皁白安知識者不以頳黄吾又安知天下之正色哉由是不遁物之色矣瞀風眩也黈黄色也赬赤色也夫有風眩之疾者視物不能審也故以黄為赤以青為黑亦猶凡俗之情妄執㓗汚雖有大聖亦孰能正之故不生其潔汙不流遁於衆色夫好貨甚者不見他物之可好好馬甚者不見他物之可好好書甚者不見他物之可好吾又安知天下之果可好者果可惡者哉由是不見物之可以保戀矣无能滑吾眞音真矣陳懐君桺使其大夫禱行聘於魯陳懐君諡桺名也禱大夫之名叔孫卿私曰叔孫其氏世為魯卿吾國有聖人若知之乎聖人謂仲尼陳大夫曰奚以果朙其聖叔孫卿曰能廢心而用形聖境超殊非凡情所測徒見其應接世務便證以為聖人豈知其所以聖哉陳大夫曰弊邑小亦有聖人異於所聞曰聖人謂誰陳大夫曰有亢倉㜽者偏得老聃之道門人中最為稱首故曰偏得其能用耳眎古視字从目示聲目古聴字从耳壬聲定公聞而異焉使叔孫氏報聘且音致亢倉㜽待以上卿之禮亢倉㜽至賔于亞寢亞寢公之次殿魯公卑辭以問之亢倉㜽曰吾能眎不用耳目非能易耳目之所用告者過也公曰音孰本作知是一本孰如是寡人增異矣其道若何寡人果願䎹之亢倉㜽曰我躰合於心心合於气气合於神神合於无其有介之有唯之音雖逺際八荒之表邇在睂古眉字从目上象額理睫之内來于我者吾必䀆知之乃不知是我七竅手足之所覺六腑五臟心慮之所知其自知而已矣心形泯合神气冥符洞然至忘與符同躰然後心亦靜而志彌逺神愈黙而昭愈彰理極而自通不思而𤣥覽非至聖至神其孰能與此斯固靈真之要極重𤣥之妙道也用道篇第二无非利物上合天心克已歸仁化行刑措不可信墬音地埅同不可信人不可信心不可信惟道可信賢主秀士豈知哉昔者桀信與其四海已不勤於道奪其國以授殷紂亦信與其四海已不龔於道奪其國以授周與猶以也祖主也夏桀殷紂躰淫奢縱自謂有民有命稟在上天窮凶肆虐不修其道故天奪其國以授於湯武今夫惰䢉音農从䢅㓙聲耕也信地實生百穀不力於其道埊亦地字墬埅同竊其菓稼而荒翳之惰農之人信地生穀不勤耕耘稂莠荒蕪故不能獲菓種齊后信人之性酧讓不朙於其道舉全境以付人人實鴟義而有其國齊簡公信人性不朙酧讓為陳恒所弑人取其國鴟義貪殘也凢人不修其道隨其心而師之營欲茂滋災疾朋舋戕身損夀心斯之矣人自師心不遵聖教營欲熾盛百殃斯集此乃心為身害朋群也舋動也戕害也故曰惟道可信道者坦蕩怙怡無所染著人能虚心歸道則身命安全埅非道不能悠久天得一以清地得一以寧蒼生非賢不能靖順庶政非才不能龢古和字理賢才皆用道以理物夫用道之人不露其用畗古福字从田髙省有之義滋㸘古萬字物功歸无有潛功宻濟百姓謂我自然神融業茂霛古靈字善也慶悠長融通也神理通達徳業榮茂厚善所積慶流後裔知而辨之謂之識知而不辨謂之道識以理人道以安人辨析事物使人去惡就善所以理人也含𢎞冲寂无所毁譽所以安鎮浮競也夫鷄曟音辰从晶辰聲而作負日任勞流汗灑埅夜分僅息䢉夫之道也鷄辰鷄鳴之旦也夜分中夜也負日謂日所曝也僅少也俯拾仰取鋭意錐撮力思摶精希求利潤賈豎之道也嚥氣谷神宰思捐慮超遥輕舉日精鍊㒨髙士之道也燕氣胎息五牙之𩔖也谷養也宰割也日精吸日精也鍊仙鍊質而升仙也剸情耑作端非正也想畢志所吏倫揆忘寢謀効位司人臣之道也専情正想盡志於所事之君遵理揆度効功於所司之位是人臣之道也清心省念察驗近習務求賢良以安㸘姓人王之道也清心寡嗜欲也省念无私也近習近臣也若由是𩔖之各順防音序恐是䦽字誤其志度不替音塞其業履是謂下有道農夫賈豎各保其業明君賢臣各脩其道則天下順序而業履安定矣導筋骨形全剪情欲神全靖言語畗古福字全古克字能也保三全是謂清賢道悳順鬼神助信義君子全禮義備小人懐有識者自是無識者亦自是有道者靜默闇鈍者亦靜默物固有佀是而非佀非而是先號後笑始吉終凶身可親而才不可親才可敬而身不堪敬敬甚不親親甚不敬親之而疎疎之而親恩甚怨生㤅古愛字从心旡聲恩也多憎至有以音為䝿有以緩䝿有以直䝿有以曲䝿百叓之其由甚不可不知是故智者難之靜神通竆意通䝿語通冨身通理勢使同道者相㤅同蓺者相嫉人情自也情通无求則相愛爭能好勝則相嫉勢使然也多才而好謙貧賤而不諂處勞而不辱冨䝿而恭勤可謂有悳者也政道篇第三順天行令不擇親疎異域同歸望風而靡人无灋以知以四時寒暑日月星䢉音辰之所行知若四時寒暑日月星䢉之所行當諸生血气之𩔖皆得其處而安其産矣人臣亦无灋以知主以主之賞罰爵禄之所加知主若主之賞罰爵禄之所加親疎逺近賢不肖者皆䀆其力而以用矣信全下安信失下危夫百姓勤勞物殫䀆爭音害之心生而不相信矣人不相信由政之不也政之不吏之辠也吏之有辠刑賞不齊也刑賞不齊主不勤朙也夫主勤朙刑賞一刑賞一吏奉灋吏奉灋政下宣政下宣人人得其所而交相信矣是知下不相信者由主不勤朙也亢倉㜽居息壤五秊息壤是周地霛王使祭公致篚帛與紉璐靈王周王也祭公周之卿士也璐美玉也靈王慕亢倉子之徳使祭公致玉帛之禮以聘之篚盛帛之篚也紉所以貫玉者也曰余末小㜽否悳忝位水旱不時藉人君何以禳之靈王云我淺末小子不有其悳忝居寳位致水旱失時人遭飢困故請問乎禳辟之方亢倉㜽曰水陰沴也陰於國政𩔖刑人叓𩔖私沴亂也水陰象陰主刑水又潜流私匿之𩔖也若刑獄不直人事多私則有人事之災旱陽過也陽於國政𩔖悳人叓𩔖盈旱陽象陽主徳陽為顯盛驕盈之𩔖若君不脩其徳人事盈多則有大旱之災楚以凡遭水旱天㜽正刑脩悳百官去私戒盈以𩔖而消百畗日至矣楚亢倉㜽名也後皆倣此此段有理鄭有胡之封珪戎弓胡國名封珪大珪也戎弓弓名也二物本胡國所有後為鄭所得異時失同於荆異時猶他時也諸侯殷㑹曰同荆楚舊號也蓋時楚大諸侯共朝於楚為㑹同之期而後鄭至荆曰必得封珪戎弓不臨兵于汝荆恃強大欲行非義因鄭後期脅而迫之將求二物鄭君病之駕見亢倉㜽曰封珪戎弓先君得之于胡綿代功寳傳章翼嗣病患也綿厯也翼嗣謂後嗣先君得此二物敬而藏之欲傳示子孫以為有功之寳今荆恃大而曰必得不臨兵國危矣寡人欲以他封珪戎弓若之何他封珪別珪也亢倉㜽曰君其少安勸君少安勿懐憂懼今是猶言今如是也楚亦有寳於此亢倉子以信義為寳飾楚之寳以貰罪於君楚所不能貰賒也偽以他珪欺誑大國取我誠信光飾而符雖罪可延賒終致後戮陷君於罪虧我信義故我不能為君必致字夫真勸鄭君勿以他珪徃今荆以淺鮮之過而負其威刑申逞不直以耗敓音奪與國荆失諸侯於是乎在諸侯聞之將警一作驚勸備備字疑衍文倫比勤朙會同上義固存鄭其首君姑待之豈必非畗淺鮮小貌也負恃也逞快也倫比猶等倫也姑且也鄭之失期實為小過荆恃強大欲肆威刑脅迫珪弓侵奪與國无悳貪取必失諸侯矣於是以胡珪戎弓未至郢郢荆所都荆人聞之聞亢倉㜽之謀曰彼用聖人之訓辭吾焉取此以不直於下而令諸侯實生心焉遽反其賂而益善焉暴猶露也遽急也賂即鄭之珪弓也人之情欲生而惡死欲安而惡危欲榮而惡辱下之人得其欲則樂樂安不得其欲苦苦危若人主放其欲百吏庶音長齒髙位尊也具㞡其欲放謂放縱也百吏百官也庶長衆士之長展申也百吏庶具㞡其欲下之人貧者竭其力富者竭其財四人失其序士農工商失其次序皆不得其欲矣下之人不得其欲相與提攜保抱逋逃𨼆蔽漂沝音流捃采以祈性命捃拾也采取也拾取野果求養性命吏又從而捕之是故不勝其危苦因有羣聚背叛之心生國非其國也勿貪户口百姓汝走勿壯城池百姓汝疲賦歛不中竆者日竆刑罰且貳䝿恐是字者日䝿科禁大行國以傾不平也官吏非才寛猛失所古冝字與百姓爭利狡詐之心生所以天下姦而難知下難知上人上人下益惑下既惑官勞官勞則賞不足勸刑不能禁易動而難靖此由官不得人故也政術至要力於審士力猶勤也士有才行比於一鄉委之鄉士能和比一鄉則委一鄉之政以任之才行比於一縣委之縣才行比於一音州委之才行比於一國委之國政而後廼能无伏士矣各得展其才用則无𨼆伏之士矣人有惡戾於鄉者誨之戾罪也人有罪戾者則一鄉之長者教誨之不改是惡戾於縣撻之在鄉不改則送縣而撻之不改是惡戾於國誅之廼能無復逆節矣誠如是舉下之人一一古畏字懐無有干諂慢之萌矣此之謂靖人賢人獲用暴惡遷善則天下之人安靖也凡天下之務莫大求士士之待來莫善通政通政之善莫若靖人人主通達政教則士歸之衆賢共理莫善於靖人矣靖人之才蓋以文章考之百不四五文章浮華矯而不實今以文章考覈靖人之才百无四五以言論考之十或一二有言者不必有徳有徳者不必有言故十中或有一二以神器靖作態度考之十全八九賢良心廣體胖神器冲和動靖態度必合儀則審而察之十中得八九矣是皆賢王慶代朙識裁擇所能爾也外雖有賢才而王無明識亦不能以裁擇王下者若以文章取士翦巧綺繿益至而正雅音素實益藏矣末世文章尚於綺靡則雅素之士不来矣以言論取士浮掞游飾益來而蹇諤諍直益晦矣浮游華飾之士貴則蹇諤忠諍之才伏矣以神气靖作態度取士外正内邪益尊而清脩朙實益𨼆矣内無明識故在擇不得其人若者賢愈到政愈僻令愈勤人愈亂矣用非賢為賢乃益所以亂夫下至大器也帝王至重位也得士靖失士亂故人主勞於求賢逸於任使嗚嘑守圀音國聚人者其胡可以不叓試於士虖人情失主所㴱恤失之大莫痛刑獄夫朙達之才將欲訟或誘之以詐或脅之以威或開之以情或苦之以戮雖作設權異而必也公一物失宜明主之所深恤况刑獄之大乎夫察獄問囚務得其實或有𨼆匿則設威以脅之開導之以實情或苦切之以刑戮雖權變多端終無枉濫也故使下之人生無所於悳死無所於怨理自當生故生無報徳理自當死故死無怨恨夫秉國建吏持刑若此可謂至官至官之代羣情龢正諸産咸㤅敬交㴱上下條固不可揺蕩有𩔖一家茍違領一作順凌逆安得動哉王返正既宅邑務求賢良等聞一善音喜豫連日平王承幽厲之後天下板蕩無復紀綱於是撥亂反正東遷洛邑改革前非務求賢哲得聞一善累日歡悦宅居也天邑即洛邑也等猶得也左右侍僕累言大臣有賢異者如是踰嵗侍僕左右小臣也見王喜悦承意阿諛王曰余一人于悳不朙務求賢異益古恐字从心工聲愳也山澤遺逸不舉豈樂聞善以自閉塞哉廼者仄媚僕臣累譽權任頗階左右意余孱昧无能㫁朙徒唯音共龢依違浸自賢敗悳莫此多不時匡遏就兹固黨仄媚邪媚也權任大臣也階升也孱弱也依違相依也邪媚小臣稱揚權任階縁左右共相䝉蔽謂我闇弱不能明察若不遏絶黨固滋深於是棄左右近習三人於市謂殺之而暴尸於市也古者刑人於市與衆共棄之貶庶司尹五人庶司尹謂權任大臣也曰無令人臣附下罔上持祿阿意天下聞之稱齊朙海南之西歸者七國至理之代輿服純音素憲令寛簡禁網疎闊夫輿服純人不勝羡不相企羡憲令寛簡俗无忌諱禁網疎闊易避難犯若人不勝羡嗜慾希微而服役此役字从人荷殳行戌會意樂業矣服從也從於所伇之業也俗无忌諱抑閉開舒而歡欣交通矣凡所抑閉既由忌諱令既无忌諱皆得開舒也易避難犯好惡分朙而䝿悳知恥矣貴徳則不犯知恥則易避夫服伇樂業之謂順歡欣交通之謂龢䝿悳知恥之謂正浮墮之人不勝於順逆節之人不勝於龢姦邪之人不勝於正順龢正三者理國之宗也音衰末之世輿服文巧憲令禳祈禳祈煩多也禁網頗僻夫輿服文巧流相炎慕俗尚文巧則下人隨流遞相企慕如火之上炎憲令禳祈俗多忌諱禁網頗僻莫知所逭逭猶逃也若流相炎慕人不忠潔而恥樸䝿華矣俗多忌諱情不通而上下膠戾矣莫知所逭則讒音乎果反繁興而衆不懼死矣夫恥樸䝿華之謂浮上下膠戾之謂音塞衆不懼死之謂冒真正之士不官於浮公直之士不官於器能之士不官於冒浮冒三者亂國之梯也荆君熊圉問水旱理亂熊荆之姓圉名亢倉㜽曰水旱由天理亂由人若人叓龢理雖有水旱無能堯湯是也堯時九年洪水湯時七年大旱故周之秩官云人強勝秩官周書篇也若人叓壞亂縱無水旱日益崩離且桀紂之滅豈惟水旱桀紂之君暴虐貪淫以滅亡非獨水旱也荆君北面遵循稽首曰天不棄不穀及此言也遵循退行也荆君敬重亢倉子故稱曰天不榖王公之卑稱也言亢倉子不棄於我故得聞此言也乃以𢎞璧十朋為亢倉㜽夀拜亞尹𢎞璧大璧也十朋十雙也亞君少尹曰庶吾國有瘳乎亢倉㜽不得已中宿微服違之他邦瘳差也違去也至理之代山無偽𨼆市無邪利朝無佞祿國産問何由得人俗醇樸國産鄭大夫公孫僑字子産亢倉㜽曰政煩苛人姦偽法令滋彰盜賊多矣政省一人醇樸其政悶悶其人醇樸夫人俗隨國政之方圓猶蠖屈之於葉也食黄身黄食蒼身蒼曰何人富亢倉㜽曰賦歛以時官上清約人富賦歛無節官上奢縱人貧勾粤之簳鏃以精金鷙隼為之羽以之棓箠其與槁樸也無擇勾粤東粤也簳箭簳也鷙隼鵰鴞之𩔖也棓箠打擊也爾雅云東南之美者有會稽之箭焉勾粤之地以精金為鏃以隼翎為羽用之打擊則同於槁樸無擇由无異也及夫蕩寇爭音衝覿武决勝加之駭弩之上則三百步之外不立敵矣排蕩冦敵爭衝决勝如此則勾粤之簳加於強弩之上無立敵者矣蜚景之劒威奪白日氣盛紫蜺以之刲穫其與劂刃也無擇蜚景神劍也劂鎌也神劍雖利以之穫禾則同於鎌刃也及夫凶邪流毒沸渭不靖加之運掌之上千里之内不留行矣凶邪流毒謂瘟疫之氣也此神劍能辟凶邪故威灮所行千里之内未嘗留行夫材有分而用有當所䝿善因峕而已耳槁樸劂刃施用常用耳粤簳蜚景以禦凶災材分所當各因時而貴也劂音厥昔者朙王聖帝下龢平㸘物茂暢羣性得極善因峕而勿擾者也古近字古㠯來下姦邪者衆正直者寡輕薄趍利者多方退靜者鱻姦者出言等於忠言巧偽亂真不能下也遂使下之人交相悲夫作灋䝿於易避而難犯救弊䝿於省叓而一令除去豪横官人不敢務私利官人不敢務私利而百姓富史刑曰災肆赦赦不欲數赦數則惡者得計平人生心惡者得計務益於姦平人生心亦為不善而賢良否塞矣人有大賊官吏捕獲因廣條引誣陷貞良闊逺牽率冀推峕序卒蒙赦宥遇賊者訖音無所快自毒而已由是人遞生計吏勞政酷莫能鎮止此由數赦之過也夫人之所以惡道不善者其有罰也所以勉有道行義者其有賞也今道不義者赦之而有道行義者被音害而不賞欲人之就善也不亦難乎代有賢主秀士肯察此論人怨者非不接人也神怒者非不叓神也巧佞甚人愈怨祀盛神愈怒君道篇第四清凈无為以身率下始生之者埅養成之者人也萬物之始生者由乎天地而養之者由乎人能養之所生而物攖之謂之㜽攖擾也人能助天養物而物馴擾之者是謂天子昔舜有盛徳三徙成都者是也㜽之動也以全氣故此官之所以自从大立一之上作立非也官者以全生也天不自理故聖人代天以理物聖人不能獨理故立官以輔之立官之由本以養物貴全天氣不使有虧傷今代之惑此惑字當作惑字主多官而反以生失所以之本矣後代惑心務在多官官多則政煩政煩則害物是失立官之本意也矣草鬱腐樹鬱蠧人鬱病國鬱百慝竝危亂不禁鬱者氣壅不通之謂也官多政煩事有壅滯如草木之成腐蠧也所謂國鬱者主悳不下宣人欲不上達也姦臣蒙蔽故主徳不下宣黎庶枉屈故人欲不上達是故聖王䝿忠臣正士其敢直言而决鬱也尅己復禮賢良自至剋損也復反也人君能以謙損反禮則賢君歸己君耕后古字蒼生自化天子親耕皇后親以身率人則天下自化由是言之賢良正可待不可求求得非賢也君有禮讓賢臣自歸故可待也君无禮讓雖復求賢賢至亦非賢也蒼生正可化不可刑刑行非理也君耕后人自効之故可化也身不自為而使人為之故人不從雖復刑行亦非禮堯䑞有人主之勤旡人主之欲故下各得濟其欲勤謂勞心以養物欲謂私身以奉己也有人主之位旡人主之心故下各得肆其心位謂居位而理事心謂求安以自適肆者遂情也士有下人㤅之而主不㤅者有主獨㤅之而下人不㤅者竭公忠而養天下則天下人愛之徇私心而媚一人則其主愛之用下人㤅者下安用主獨㤅者下危人主安可以自放其㤅憎哉由是重下者當制其情聖人以天下為安危欲天下之安則人主不得縱其愛憎當抑制其私情所謂下者謂其有㸘物也所謂有邦國者謂其有人衆也夫國以人本人安國安故古憂字从心頁人愁則形於首會意作憂非國之主務求理人之術天下以萬物為多邦國以人衆為富故當任賢輔已玉之所以難辨者謂其有怪石也金之所以難辨者謂其有鍮石也怪石似玉鍮石似金猶姦人外正内邪之難辨今夫以隼翼而被之鷃視不朙者正以隼朙者視之乃鷃也隼鷂也鷃雀也今夫小人多誦經籍方書或學奇技通說而被以青紫章服使愚者而眎之正君子朙者而眎之乃小人也故人主誠朙以言取人理也以才取人理也以行取人理也人主不朙以言取人亂也以才取人亂也以行取人亂也人主明者以言行取人盡皆理也主昏以言行取人盡皆亂也夫聖人之用人也䝿耳不聞之功目不見之功口不可道之功而百姓暢自理矣夫賢良之世也不顯其名不彰其用不稱其能潜功宻濟理自𤣥暢名迹不生人無企尚故聖人貴之也若人主䝿耳聞之功下之人運貨逐利而市譽矣若人主貴聞臣下之功則姦人運其財貨隨便逐利以市聲譽䝿目見之功下之人恢形異蓻而爭進矣恢誕形容奇異技藝夸企爭進愈亂天下䝿可道之功下之人習舌調吻而飾辭矣利口便辨虚而不實使下之人市譽爭進飾辭見達政敗矣尚名尚能則政理之道衰人主皆知鏡之朙己也而惡士之朙己也鏡之朙己也功細士之朙己也功大知其細失其大不知𩔖矣鏡知形之好醜士知心之善惡正形之功細正心之功大今人主乃貴其細失其大豈不惑哉於虖人主清心省叓音事人臣恭儉守職太平矣而代主或難之吾所不知也若人主方寸之墬不朙不斷墬之四海之内動植㸘𩔖咸失其道矣方寸之地謂心所居也動謂含氣之𩔖植謂草木之𩔖以耳目取人者官多而政亂取見聞之功則飾偽者衆爭進者多主不能辨故官多而政亂矣以心慮取人者官小而政清用心慮神識而得人者其官甚寡而政甚理是知循理之代務求不可見不可聞之材澆危之代務取可聞可見之材於虖人主豈知哉以耳目取人人皆敓上音禳下音奪以買譽以心慮取人人皆靜正以勤徳吏靜正以勤悳不言而自化吏敓以買譽刑之而不音畏代主豈不知哉臣道篇第五盡忠竭力謀効所同夫國之將興也朝廷百吏或短或長或醜或美或怡或厲或昰或非醜惡也怡怡也厲嚴厲也雖其言觀其貌有似不同察其志徴其心䀆於國所以剛訐不怨黜退不愕議得其中无違乎理故天不惑此疑忒字誤其峕埅不乏其利人不亂其叓音事音鬼神開贊蠻夷柔同保合太龢㸘物化育國之興也朝廷禄位務盡其忠各竭其能力行公正无有阿私故天時不惑地利不乏人事不亂鬼神助祐逺方柔服國之將亡也朝廷百吏姿貌多美顔色諧龢詞氣華柔動止詳潤亡國之臣外雖和順内懐猜忌各徇其私闇相謀害雖觀其貌其言有若歡洽察其志徴其心䀆在競位所以聞奇怪見異必愕狙嫉相蒙遂䘮其道故天告災峕隸作時字从日𤓰聲辰也埅生反物天反峕為災地反峕為妖人作凶悳神間禍間伺也戎狄交侵亂𢎞多㸘物不化夫不妎音害人力不損官吏而功成政下峊音阜也百姓上滋主悳如此者忠賢之臣也若費財煩人危官茍效一峕功利規賞於主不顧過後貽災於國如此者姦臣也至理之代官得人不理之代人得官邾龍客閑反又音慳問叓君亢倉㜽曰既榮死而臣人者也心莫若公無阿私也貌莫若龢言莫若正公不欲露龢不欲雜正不欲犯君不見察亦不欲犯顔而諫之古之清勤國脩正今之清勤身脩名夫國脩政者區處條別動得其合於大體身脩名者區處條別逺不通拘於小節是知心以道主抵物得其所心以事主抵物失其所以道為主公心也以事為主私情也抵者觸也臣居上位不諫下位不公不合贍其祿贍賙給也君不嚴敬大臣不彰信小臣不合官其朝有才者不必忠忠者不必有才臣不患不忠適䀆忠而主莫之信不患不信適信之而莫能叓叓事事猶用事也上等之人得其性下理中等之人得其性下朙主用上等之人當委以權便叓肆其所上等之人謂賢良也公平正直無所阿私使之莅職信説匡贊雖權變有時必歸於正也用中等之人當程課其功示以賞罰中等之人謂藝能之士見善則遷見惡則染故人君賞罰以制之賢道篇第六克己復禮賢良自至賢良所以屢求而不至難進而易者非㤅身而不死王叓適䀆忠而主莫之信耳自知有才識之人外謹而内旡内旡憂慮其於衆也龢正而不狎親之彌莊疎之古退字从之从日夕會意却也去而不怨窮厄以命自寬榮達以道自止人有眎其儀賢也其聲賢也徴神識或負所朢夫賢人其見用也入諷譽出龔默職司勤辨居室儉閑諷刺君之過失譽謂稱君之美也龔黙靜慎也辨理也閑謂防閑也其未見用也藏身於終藏識於目藏言於口飽食安步獨善其善貞而不怨智者不疑叓識者不疑人有識之士行危而色不可疎言遜而理不可拔謂遇濁世不變其志行雖危而色常和言雖遜而理然凢謂賢人不自稱賢自伐者無功故非賢也效在官一本效在官天功在叓叓驗其官政察其用事即賢不肖可辨也太平之峕上士運其識中士竭其耐耐音能小人輸其力齊有掊子者材可以振國行可以獨立振齊也獨立謂徳行孤標不可傾拔叓父母孝謹鄉黨恭循念居貧無以養施信義而遊者久之矣所如寡合或峕夸毗者所蚩紿如往也寡合少諧偶也夸毗謂矜恃也笑也紿欺也於是負杖步足問乎亢倉㜽曰吾聞音至人忘情至人虚懐與道合體故忘情也黎人不事情黎衆人智力愚昧不能用情也存情之曹務其教訓而尊信義曹輩也中人存情情以信義為尊吾乃不知工工猶能也躬行信義所往寡合不知其所能為受不信信世有受人之不信將以為信也信而不見信信有實為信而不為人所見信乃自以為信也勤慕義義有義而不自義為義人有本非義而以慕義為義乃為人所稱義也信義之士常獨厄隨古退字胡以取䝿虖峕而教理之所上也亢倉㜽俯而循袵仰而譆超歌袵衣襟也譆歎聲也超然髙舉之貌曰時之陽兮信義音昌時之陽謂君有道也君有道則信義昌盛時之默兮信義伏時之默喻君暗昧也君暗昧則禮義伏藏陽與默昌與伏汨吾無誰私兮羌忽不知其讀汨亂也羌發聲也讀云也夫時有理亂故用有行藏陽則與時俱昌黙則與時俱藏隨流任運寧有私邪今乃問我故我不知其所云也矣夫運正性以如適而物莫之應者真不行也真且不行謂之道䘮信義者正性之用真者正性之本道䘮之峕上士乃𨼆𨼆之義有可也時有可為也莫可者也時有泰否莫得長為有可用也有時而用莫可用者也用有行藏莫得長用祭公問賢材何從而不至亢倉㜽曰賢正可待不可求材慎在求不在無材在求而擇之不在无材若㜽靜大臣朙刑不避䝿澤不隔下賢人自至而求用矣賢人用四海之内朙目而眎清耳而坦心而無鬱矣自成墬自寧㸘物醇化神不能霛天下醇和故鬼神不能見霛怪故曰賢正可待不可求若㜽勤朙大臣龢理之求士也恢𢎞方大公直靖人之材至若㜽苛察大臣躁急之求士也曲心巧應毁方破道之材至若㜽疑忌大臣巧隨之求士也竒姓異名仄媚怪術之材至若㜽自賢大臣固位之求士也叓文逐譽貪濁浮麗之材至若㜽依違大臣回佞之求士也内忠外僻情毒言龢之材至故曰材慎在求不在無㫺古昔字从殘肉日以晞之假借往昔字者黄帝得常㒨封鴻容丘三人黄帝臣也商王得伊尹中興得甫申中興周宣王也甫仲山甫申申伯也齊桓得寗籍即寗戚皆由數君體道邁仁布昭聖武思輯灮朙寛厚昌正而衆賢求用非簡核而得也行也輯睦也簡核也祭公曰夫㜽云賢人不求而自至亦有非賢不求而自至者虖亢倉㜽曰夫非賢不求而自至者固衆矣夫下有道賢人不求而自至下無道非賢不求而自至人主有道者寡無道者衆下賢人少不肖者多是知非賢不求而自至者多矣祭公曰賢固濟下材亦能濟下俱濟下賢與材安取異邪亢倉㜽曰窘虖哉其問也窘迫也言所問迫切功成叓畢不殉封譽恭樸儉之謂賢殉求也功成不居其位守恭儉以自牧也謂之賢人功成叓畢榮在禄譽灮揚志滿之謂材賢可以鎮國材亦可以理國所謂鎮者龢寧無人不知其力至悳潜化人莫能知所謂理者勤率其叓人知所於徳人賴其功故推徳於己一賢統衆材有餘衆材度一賢猶不足如是賢材之殊域一賢雖少統領衆才亦有餘衆才雖多比度一賢猶不及有居山林而諠者有在人俗而靜者有諠而正者有靜而邪者凡眎察其貌鄙俗而能有賢者㸘不一眎察其貌端雅而實小人者十而九夫不練其言而知其文不責其儀而審其度不采其譽而知其善不流其毁而斷其實可謂有識者也訓道篇第七至徳之用萬教之主神明共贊可不化民閔子騫問仲尼道之與本从省今作孝相去奚若疑其相逺也仲尼曰道者自之妙用者人道之至悳窮於本始謂之道施於人理謂之孝道能通生萬物不知所由然故曰妙用孝者善事父母盡敬盡順通乎神明故曰至徳夫其包運墬發育㸘物曲成㸘類不希性夀性者剛柔之質夀者一期之盡其功至實而不物府不叓官無功尸捫求眎莫得而有字之曰道用之於人字之曰者善叓父母之名也夫善叓父母敬順本意以承之順承顔色無所不至發一言舉一意不忘父母營一手措一足不忘父母叓君不忘忠朋友不不信臨下不不敬嚮善不不勤雖居室之中亦不懈其誠此之謂全故至誠之至通乎神朙光于四海有感必應善叓父母之所也昔者虞䑞其大矣庶母惑父屢憎之䑞心益恭愳音懼而無怨謀使浚井下土實之于峕休震動神朙駿赫導宂而出奉養滋謹由是𤣥悳茂盛為下君善叓父母之所也史記稱舜父瞽瞍與庶母弟各皆欲殺舜使舜修廩瞽瞍從下縱火焚廩舜乃以兩笠自扞而下去得不死後又使舜穿井舜為匿孔旁出舜既入深瞽瞍與象共下土實之舜從匿孔出後事父彌謹堯乃禪位焉文王之太㜽也其父老矣朝夕必至乎寢門之外問寺人曰兹日安否如何寺人奄官主在左右侍君曰安太㜽温喜色小不安節太㜽色滿容朝夕食上謂侍者進食於君太㜽必眎寒煗之節食下必知膳羞所進後知所食之多少寺人言疾太㜽肅冠而齋君有疾太子嚴肅衣冠而齋齋者虚心專志以祈神明使捄䕶耳膳宰之饌必敬眎之湯液之貢必親嘗之嘗饌善太㜽亦能食嘗饌寡太㜽亦不能飽以至于復初後亦復初君病間而太子亦復初君后有過怡聲以諷怡悦也謂下氣怡聲㡬微諫諷君后所㤅雖小物必嚴龔不敢慢君父所愛是故成於身道洽下雅曰文王陟降在帝左右言文王所為天必助之言文王靜作進退必贊之故紂不能贊佐也文王為天所佐故殷紂雖暴不能輒害夢啓之夀武王夢帝與九齡文王曰汝以為何武王曰西方有九國君王其終撫諸文王曰非也我百爾九十吾與汝三焉文王九十七而終武王九十三而終卜世三十卜年七百所命也善叓父母之所也閔㜽騫曰善叓父母之道既幸聞矣問教㜽之義仲尼曰凢三王教㜽必視禮樂視示也樂所以修内禮所以修外禮樂交修則徳容發輝于貌故能温容而文朙夫人臣者殺其身有益於君之况利其身以善其君虖是故擇建忠良貞正之士之師傅欲其知父㜽君臣幼之道夫知人㜽後可以人父知人臣後可以人君知事人後能使人此三王教㜽之義也閔子騫退而叓之於家三年人無間於父母昆弟之言上事父母下順兄弟盡善盡美故人無非間之言交遊稱其信鄉黨稱其仁宗族稱其悌悳行之聲溢於下此善叓父母之所也齊太㜽坐清臺之上燕莊侯他莊侯燕諡也他名也莊一作壯字髙冠嚴色左帶玉具劒右帶環珮左光照右右光照左言玉佩之光交相照也太㜽讀書不眎莊侯他問曰齊國有寳乎太㜽曰主信臣忠百姓戴上齊國之寳也莊侯他應聲解劒而去聞義而服也此章言君子尚忠信不尚華飾於虖人有偏蔽終身莫自知已矣贒者見之寛恕而不言小人㤅而溢言親戚憐嫉而貳言人有偏蔽惡虖不自知哉是故君㜽檢身常若有過衣其衣食其食知其過而不音克有以正之者君㜽恥之將欲有言識其必不能行者君㜽罕之君不納忠諫則罕言以避患也當責衆人之惡者眎已善虖哉當責衆人之邪者視已正虖哉此之謂返朙先審身之善正然後責人之邪惡翟西氏之㜽甚謹翟西憐其㜽而好躁妄之言翟西辰出夕返曰甲死矣其㜽信之既而甲在焉他夕曰乙且予其㜽伺將行仇既而不見惡耑作端非草木初生之題惡始發耑也他夕曰丁病矣其㜽覘之丁誠無恙舉此𩔖也冒淹秊序㜽固謹至於訓勤益不保承鄉國之人疾其咎口謀將殺之翟西聞而愳歸以告㜽㜽未甚信既而翟西既殺此章戒人輕言致害雖愛子猶不信之况他人乎謂多言之人疎露亦有辭約而不宻者謂輕佻之人不定亦有體閒而心躁者謂叢之人猥細亦有外㓗而内濁者若𩔖而引之不可殫載若非徹識安能洞詳有不可以應叓也者内靜而外動其動而難靜外是利貪而逐之愈得愈貪故身勞難靜峕有不可求叓也者内思而外待待至而後樂謂内興情欲縁境思求心有待得而後樂不知心揺而傷性是故外靜而内動者揺思而損性奔走而逐利者勞力而名惟泊然无欲不為名位所誘然後身安而性全人生於代或有叓不遂志而宣言云不遇峕者是无異負丹頸之罪俟峕行戮豈不殆哉不能危行言遜干犯時君无異負斬首之罪待戮也丹血色也其有博才通識未見稱用者正可云峕非不清命未與耳豈不韙歟長於諫者務依存前人之性而剪制其情之所由是以彼此開進親敬殷篤不長於諫者務攻前人之性而闇於情之所來是以彼此嫌貳猜舋日積兒童之所簡者乃耋之所非耳目之所娛者乃心慮之所疾健責下之愚者已之未贒也健責下之迷者已之未朙也賢明者當恕愚迷者勿責以未贒責衆愚未贒者以之亡以未朙責衆迷未朙者以之傷愚迷之人旡所損健責者徒自傷耳䢉道篇第八夫者人之天理國之道務農為本人捨本而叓音事末不一令本謂農也末謂趨浮利也人趨末則姦詐多端故令不能制也不一令不可以守不可以戰趨利多端人心不一固不可固守亦不可以攻戰人捨本而叓末亣産約人貪浮利則産業薄亣古其字亣産約輕流徙輕流徙國家峕有災患皆生逺志無復居心人忘本而叓末好智好智多詐多詐巧法令巧法令㠯昰非㠯非昰古先聖王之所以理人者先務䢉古農字疑衍䢉業非徒墬也䝿其志也志在安人人䢉樸樸易用易用邊境安安主位尊人䢉童如童兒無異志童少私義少私義則公法立力博湥䢉則亣産複複猶重也亣産複則重流不流散也重流則死其処无二慮昰下音為一心矣下一心軒轅几音蘧之理不昰過也軒轅几蘧古有道之君古先聖王之所以茂耕織者以本敎也昰故㜽躬率諸侯耕籍田大夫士第有功級勸人尊墬産也第次第也月令云正月中氣天子乃擇元辰親載耒耜置之車左率公卿諸侯大夫躬耕籍田天子三推公五推卿諸侯九推是以功級勸人也后妃率嬪御一作又作蚕於郊桑公田勸人力婦敎也月令云三月中氣命有司无伐桑柘乃修器后妃齋戒享先而躬桑以勸事祭義云古者天子諸侯各有公桑室近川而為之君卜三宫之夫人世婦之吉者使入于室世婦率奉繭以示于君遂獻于夫人夫人繰三盆手遂布于三宮夫人世婦之吉者使繰之此勸婦教也男子不織而衣婦人不耕而食男女貿功資相業此聖王之制也貿易也故敬峕㤅日埓實課功埒量也非老不休非疾不息一人勤之十人食之上農夫食十人當峕之務不興土功不料師旅男不出御女不外嫁以方䢉興土功理師旅行婚嫁皆謂方農業也輝運也謂男子不親御黄帝曰四峕之不正正五榖而已耳夫稼之者人也稼種也生之者䒶也養之者墬也昰㠯稼之容足耨㞢容耰耨鋤也耰謂鋤器也耘㞢容手耘除草也昰謂耕道種苖可使容足耨之可使容耰耘之可容手䢉攻食工攻器賈攻貨攻理也峕叓不龔敓之㠯土功昰謂大君王不恭農事而其時以興土功則大凶之道也凡稼蚤者先峕暮者不及峕寒暑不節稼乃生災謂大早大晚者不得中和之氣冬至已後五旬七日而昌生旬十日也五十七日在立春節中而草木昌發於昰虖始耕叓䢉之道見生而生見死而穫死因天時而興民利也藝種也穫刈也發峕埅産財不與人昋音期有秊祀土無秊祀土有年豐年也无年荒年也祀土祭社稷也春祭祈豐年也秋祭報成熟不以有年則祭无年不祭所以祈地利重人命無失人峕迨峕而作過峕而止老弱之力可盡迨及也雖老弱可使盡耕所以趨使也不知峕者未至而逆之謂興農大早既往而慕之時既過往而慕之是大晚當其峕而薄之雖當其時而用功寡薄所收亦不多此從叓之下也此三者雖從農務不得其時故云下也人耨必以旱埅肥而土緩夫鋤必用旱時旱時則草易死而土脈肥緩稼欲産於土而殖於堅者殖長也下種欲其土細如塵則地虚而根深及苖深長也得雨則土堅土堅則莖固也慎其種勿數無疎數謂煩宻於其施土無不足無有餘施土謂施種於土也種不足則傷疎而費地於有餘則傷宻而損穀不費不損取其中也甽欲湥以耑畝欲沃以耑正真也畝深直則水流疾畝沃平則潤澤均下得侌上得昜後盛生下陰謂水潤上陽謂日氣盛咸生也吾苖有行故強弱不相故大苖成行則長疾強不害弱則易大正其行通當作亣中䟽為泠凮凮古風字使苖䟽而通風有收而多功率稼望之有餘就之䟽昰埅之竊也由地瘠薄也苖不茂盛若被竊之狀不除蕪除之虚昰叓之傷也除理也草盛而後除之苖則虛矣是人事傷之苖其弱也欲孤欲一一孤生不併聚也其也欲相與居與衆共相蔭映其熟也欲相扶无倒折之害三以族稼乃多穀三者如人之宗族共相扶持則多收也凡苖之患不俱生而俱死生不齊則不茂矣昰㠯先生者米後生者粃強者凌弱故後生者不實昰故其耨也其兄而去其弟以人喻苖先後兄弟樹肥無扶疎樹墝不欲專生而居墝瘠也專生獨居不柰夙旱也肥而扶疎多粃墝而居多死不知耨者去其兄而養其弟不收其粟而收其粃上下不安則稼多死得峕之禾長稠當作秱而大穗圜粟而薄糠米而香舂而易而食之強禾粟也稠穗頸也圜圓也甘味也失峕之禾湥芒而小莖穗銳多粃而青蘦深芒長芒也鋭細也青蘦米青也得峕之黍穗不芒㠯搏米而寡糠搏米謂以手挼菽而出米也失峕之黍大本華莖葉膏短穗本根也華莖莖傍有花名膏肥大也得峕之稻莖葆秱穗如馬尾葆大也馬尾言長也失峕之稻纖莖而不滋厚糠而菑死得峕之麻疎節而色陽堅枲而小本陽光揚也堅牢也言皮堅勁也失峕之麻蕃柯短莖岸節而葉蟲蕃柯枝柯多也岸節言節髙也得峕之菽莖而短其莢二七㠯族多枝數節競葉繁實稱之重食之息菽豆也族聚也息猶盈也失峕之菽㠯而蔓浮葉虚本疎節而小莢得峕之麥秱而頸族二七㠯行薄翼而䵍色䵍吐見切薄翼糠也䵍黄色也食之使人肥且有力失峕之麥胕腫多病弱苖而翜穗胕腫謂根莖麤而且蟲翜穗多芒也昰故得峕之稼豐失峕之稼約庻穀盡從而食之人四衛變強耳目聰朙氣不入身無苛殃善虖孔生之言冬飽則身温夏飽則身凉夫温凉峕適人無病音疹人無病是疫癘不行疫癘不行咸得遂其天秊故曰穀者人之昰㠯興王務䢉王不務䢉昰棄人也王而棄人將何圀本从或聲古作唐武后作圀俗作囯㢤兵道篇第九兵者不祥之器不得已而用之秦景王將眎強兵於下秦時肴函險固兵強士勇故眎強兵於天下使天下无敢與之敵眎猶示也庶鮑戎必命亢倉㜽庶長秦爵號鮑戎人姓名待㠯壤邑十二周實迫之周宻也欲問亢倉子之計故以十二邑待之恐其不来宻使鮑戎迫之使必来亢倉㜽至自榮泉賔于上館榮泉秦地名景王三日弗得所問欲問之而弗得下席北首頓珪曰䒶果無意恤孤耶北首頓珪盡禮而已亢倉㜽油虧盻曰朕㠯主異之問而寧弊弊焉㠯斫刺故油然㣲動貌虧側也盻顧也朕我也以景王有逺異之問而何謂弊弊焉言景王以兵戈斫刺為故乎言其所問下也抑者隨其所而得正者無如可矣言景王既以兵道問我故我抑亦隨其所欲而正之非至理之可也景王一拜再舉歛黼袵端珪抑而坐曰實惟所命黼袵繡襟也抑者低首也惟天所命願垂告命也亢倉㜽仰榱而噓俯正顔色曰原兵之所與始有人俱榱椽也嘘嘆也嗟其不問至道故仰而發嘘嘆夫兵之所起與人俱生本始有之非獨今也夫兵也者出人之威也人之有威性受於人有喜怒之性本受於天怒則威生威生則兵起之由也故兵之所自来上矣嘗無少選之不用少選猶少時也喜怒之情用之无常故无少時不用也䝿賤少賢愚相與察同同察怒炁之動則知兵起之原也兵之兆在心懷恚而未發兵也疾眎作色兵也傲言推捘兵也捘亍寸反侈鬬攻戰兵也此四者鴻細之爭也恚怒也作色厲色也捘亦推也謂相椎盪也四者雖有大小之異皆有怒心故為兵也未有尤之峕人實揭材木以鬭矣尤黄帝時諸侯兄弟八十一人銅頭鐵額與黄帝戰於涿鹿之野始造兵器為黄帝所滅黄帝用水火矣或引水注邑或縱火燒城共工稱矣共工與顓頊爭天下五帝相與爭矣一興一廢勝者用叓用兵之道有廢有興皆以順天而勝者得用矣夫有㠯用藥而死者欲禁下之醫非也有以椉舟而死者欲禁下之船非也有以用兵而喪其圀者欲禁下之兵非也夫兵之不可廢譬水火焉善用之福不善用㞢昰故怒笞不可偃於家刑罰不可偃於圀征伐不可偃於下笞鞭杖也偃息也古之聖王有義兵而無偃兵義兵者順天應人所以誅暴亂也兵誠義以誅暴君而振若人人之悦本闕字秦刻石文作俗作也若㜽之見慈親餓𨽻之遇美食號呼而若強弩之射湥谷振救也𨽻僕𨽻也強弩之射深谷言投赴疾也勝負之决勿徵於他必反人情人㞢情欲而惡死欲榮而惡辱死榮辱之道一三軍之士可一心矣人君與三軍之士同其死生榮辱則三軍雖衆可使一心矣凡軍欲其衆也心欲其一三軍一心可使無敵人古㞢至兵蓋重古之至極善用兵者蓋重慎其令也故其強者其敵弱其信者其敵詘先勝之於此勝之於彼夫料敵制勝必先自料若與衆同死生而三軍一心則勝矣誠若此敵胡足勝也凡敵人之来也以求利也今来而得死且以走為利則刃無所與接矣此之謂至兵傲虐姦詐㞢與義理反也言姦兵與義兵逆順之理相反其勢不俱勝不相立義兵勝姦兵敗故義兵入於敵之境則人知所庇矣兵至於圀邑之郊不踐果稼不穴丘墓不殘積聚不焚室屋得人虜垕而歸之但與人期以敵資以章好惡以示逆順若此而猶有愎狠凌宕不者雖行武焉可也愎狠猶惡戾也宕流宕也先行義以示之猶有惡戾不聴服者雖用武誅可也先發聲出號曰兵之来也以除人之讐以順之道故尅其圀不屠其人誅所誅而已獨誅者誅暴君也於是舉選秀士賢良而尊古字俗作封之求見孤疾老而拯敬之孤疾之人拯給之長老者致敬也發府庫之財散倉廩之秩説文曰積也毛氏曰以禾形从失聲也本再生稻借為秩序字不私其物曲加其禮不私其利與衆共之曲加其禮聘以求賢也今有人於此能从屮土象艸出土上也死人人下當有生字一人下之人爭叓之矣生猶活也言有人以義活一人之死則天下咸事之義兵之一人亦多矣人孰不悦故義兵至鄰㞢人歸之若㳅水諸國之人望之如父母行滋逺得人滋衆辭未終景王興起抑首而坐至是坐而起立舉首也曰孤獲聞先生敎言不覺盈宇宙志知所如也而心滋益龔既聞義兵之道鄙其姦傲之心故志氣盈滿充塞宇宙志知所如也於昰步前稱觴為亢倉㜽夀舉步前進稱觴闕重道飾也拜居列師位嚴于齋室又月本作步又作𨽻作涉旬辰加天闗白晝行道天闗即天罡謂辰時也行道行弟子禮也亢倉子註
