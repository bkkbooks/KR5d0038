body:
  text: 亢倉子注後跋右亢倉子九篇類道家書然其言多采莊文吕氏春秋説苑戴氏禮譒書髙子略謂泛而不濫而不實柳子以為空言人多未見此書及見之多以此取議又以用唐人文字為唐峕偽書逮鐂項之攻嬴今觀其人所述當開元寶子方尊用其説處士王褒謂莊子倫桑子子倫亢倉子取其文義補其亡意必述其舊而纂成之或隨甪字以奇其古書自六經孔孟外求其寡況是哉然其間有一二可取又非特農道一書可孤行豫久求此未見南京國子監祭酒吳先生以此本寄豫且屬鏤板傳好叓商竒之遂加音釋重録梓因題亏後以識蘭道人金城黃諫書
