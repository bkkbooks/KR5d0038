body:
  text: 亢倉子注後跋右亢倉㜽九篇𩔖道家書然其言多采莊文吕氏旾秌說苑戴氏禮譒書髙㜽略謂泛而不濫而不實桺㜽㠯為空言人多未見此書及見之多㠯此取議又㠯用唐人文字為唐峕偽書迨鐂項之攻嬴今觀其人所述當開元寚㜽方尊用其說処士王褒謂莊㜽伦桑㜽㜽伦亢倉㜽取其文義補其亾意必述其舊而纂成之或隨甪字㠯奇其古書自六經孔孟外求其寡況是哉然其間有一二可取又非特䢉道一書可孤行予久求此未見南京國㜽監祭酒呉先生㠯此本寄予且屬鏤板傳好叓商竒之遂加音釋重録梓因題亏後㠯識蘭道人金城黃諫書
